<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APC Cebu Warehouse Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      color: #38bdf8;
      margin-bottom: 0.5rem;
    }
    p {
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .status {
      display: inline-block;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem 2rem;
      font-family: monospace;
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 APC Cebu Warehouse Server</h1>
    <p>API is running</p>
    <div class="status">GET /api/health</div>
  </div>
</body>
</html>
