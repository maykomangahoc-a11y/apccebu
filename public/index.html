<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="APC Cebu Warehouse Management System">
  <title>Onesource Logistics</title>
  <link rel="stylesheet" href="/css/index.css">
  <link rel="icon" type="image/png" href="/onesource-icon.png">
</head>
<body>

  <!-- ═══ Login Page ═══ -->
  <div id="login-page" class="login-page" style="display:none"></div>

  <!-- ═══ App Layout ═══ -->
  <div id="app-layout" class="app-layout" style="display:none">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <img src="/onesource.png" alt="Onesource Logistics" style="width: 38px; height: 38px; border-radius: 10px; object-fit: contain; flex-shrink: 0;">
        <div>
          <div class="brand-text">Onesource Logistics</div>
          <div class="brand-sub">Asia Inc. Portal</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Outbound</div>
          <a class="nav-item" data-path="/dashboard" href="#/dashboard">
            <span class="nav-icon">📊</span> Dashboard
          </a>
          <a class="nav-item" data-path="/dispatch" href="#/dispatch">
            <span class="nav-icon">📋</span> Dispatch Plan
          </a>
          <a class="nav-item" data-path="/checking" href="#/checking">
            <span class="nav-icon">✅</span> Outbound Checking
          </a>
          <a class="nav-item" data-path="/picking" href="#/picking">
            <span class="nav-icon">📦</span> Outbound Picking
          </a>
          <a class="nav-item" data-path="/reporting" href="#/reporting">
            <span class="nav-icon">📈</span> Reporting
          </a>
        </div>

        <div class="nav-section" style="display:none">
          <div class="nav-section-title">Inbound</div>
          <a class="nav-item" data-path="/inbound" href="#/inbound">
            <span class="nav-icon">📥</span> Inbound
          </a>
          <a class="nav-item" data-path="/putaway" href="#/putaway">
            <span class="nav-icon">🏗️</span> Putaway
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Configuration</div>
          <a class="nav-item" data-path="/resources" href="#/resources">
            <span class="nav-icon">👥</span> Resources
          </a>
          <a class="nav-item" data-path="/settings" href="#/settings">
            <span class="nav-icon">⚙️</span> Management
          </a>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
      <header class="header">
        <div class="header-left">
          <button class="menu-toggle" id="menu-toggle">☰</button>
          <h1 id="header-title" class="header-title">Dashboard</h1>
        </div>
        <div class="header-right">
          <div class="user-badge">
            <div class="user-avatar" id="user-avatar">?</div>
            <div>
              <div class="user-name" id="user-name">User</div>
              <div class="user-role" id="user-role">viewer</div>
            </div>
          </div>
          <button class="btn-logout" id="btn-logout">Sign Out</button>
        </div>
      </header>

      <main class="page-content" id="page-content">
        <div class="loading-container">
          <div class="spinner"></div>
          <span>Loading...</span>
        </div>
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/pages/login.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/dispatch.js"></script>
  <script src="/js/pages/picking.js"></script>
  <script src="/js/pages/processing.js"></script>
  <script src="/js/pages/inbound.js"></script>
  <script src="/js/pages/putaway.js"></script>
  <script src="/js/pages/resources.js"></script>
  <script src="/js/pages/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
